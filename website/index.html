<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Christopher White Collective</title>
<meta name="viewport" content="width=1280">
<link rel="stylesheet" href="./colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--night-800); color: var(--halo-100);
               font-family: var(--font-body); }

  /* Live indicator (used by LiveIndicator component) */
  @keyframes cwcPulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(201, 91, 46, 0.5); }
    50%      { opacity: .8; box-shadow: 0 0 0 10px rgba(201, 91, 46, 0); }
  }
  .cwc-live {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 14px 6px 12px; border-radius: 999px;
    background: rgba(201, 91, 46, 0.10);
    border: 1px solid rgba(201, 91, 46, 0.35);
    font-family: var(--font-ui); font-size: 11px; font-weight: 600;
    letter-spacing: 0.22em; text-transform: uppercase; color: #E8835A;
  }
  .cwc-live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--ember-500);
    animation: cwcPulse 2.4s ease-in-out infinite;
  }

  /* hide scrollbar offset for sticky player */
  body { padding-bottom: 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="common.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { 
      (window.vaq = window.vaq || []).push(arguments); 
    };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
